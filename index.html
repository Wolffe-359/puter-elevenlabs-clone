<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Puter Voice Studio</title>
<link rel="stylesheet" href="style.css">
<script src="https://js.puter.com/v2/"></script>
</head>
<body>
<div class="sidebar">
<h2>Puter Voice Studio</h2>

<label>Voice</label>
<select id="voice">
<option value="21m00Tcm4TlvDq8ikWAM">Rachel</option>
</select>

<label>Model</label>
<select id="model">
<option value="eleven_multilingual_v2">Multilingual V2</option>
<option value="eleven_flash_v2_5">Flash V2.5</option>
<option value="eleven_turbo_v2_5">Turbo V2.5</option>
<option value="eleven_v3">V3</option>
</select>

<label>Format</label>
<select id="format">
<option value="mp3_44100_128">MP3 Standard</option>
<option value="mp3_44100_192">MP3 HQ</option>
</select>

<button id="generate">Generate</button>

<h3>History</h3>
<div id="history"></div>
</div>

<div class="main">
<h1>Puter ElevenLabs Clone</h1>

<textarea id="text" placeholder="Enter text..."></textarea>
<div id="count">0 characters</div>

<div class="batch">
<h3>Batch Mode</h3>
<p>Separate scripts with ---</p>
<textarea id="batchText" placeholder="Script 1&#10;---&#10;Script 2"></textarea>
<button id="batchGenerate">Generate Batch</button>
<div id="progress"></div>
</div>

<audio id="player" controls></audio>
<button id="download">Download Current Audio</button>
</div>

<script src="app.js"></script>
</body>
</html>
