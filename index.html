<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puter Voice Studio</title>

<link rel="stylesheet" href="style.css">

<script src="https://js.puter.com/v2/"></script>

</head>
<body>

<div class="container">

<div class="sidebar">

<h2>Puter Voice Studio</h2>

<label>Voice</label>

<select id="voice">
<option value="hIreuBly94QFepU63yel" selected>
Scotty (Australian English)
</option>

<option value="21m00Tcm4TlvDq8ikWAM">
Rachel
</option>
</select>

<label>Model</label>

<select id="model">
<option value="eleven_multilingual_v2">
Multilingual V2
</option>

<option value="eleven_flash_v2_5">
Flash V2.5
</option>

<option value="eleven_turbo_v2_5">
Turbo V2.5
</option>

<option value="eleven_v3">
V3
</option>
</select>

<label>Output Format</label>

<select id="format">
<option value="mp3_44100_128">
MP3 128kbps
</option>

<option value="mp3_44100_192">
MP3 192kbps
</option>
</select>

<button id="generate">
Generate Audio
</button>

<button id="download">
Download
</button>

<div class="history-section">

<h3>History</h3>

<div id="history"></div>

</div>

</div>

<div class="main">

<h1>Puter Voice Studio</h1>

<textarea
id="text"
placeholder="Paste your script here..."
></textarea>

<div id="count">
0 characters
</div>

<progress
id="progressBar"
value="0"
max="100">
</progress>

<div id="progress"></div>

<audio
id="player"
controls>
</audio>

<div class="batch">

<h3>Batch Mode</h3>

<p>
Separate scripts with ---
</p>

<textarea
id="batchText"
placeholder="Script 1

---

Script 2">
</textarea>

<button id="batchGenerate">
Generate Batch
</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
